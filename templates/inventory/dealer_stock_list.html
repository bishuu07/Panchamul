{% extends 'dashboard/base.html' %}

{% block content %}

<div class="card-box">

    <h3>Dealer Stock</h3>

    <table class="table table-bordered">

        <thead>

            <tr>

                <th>Dealer</th>
                <th>Product</th>
                <th>Quantity</th>

            </tr>

        </thead>

        <tbody>

        {% for stock in stocks %}

            <tr>

                <td>
                    {{ stock.dealer.name }}
                </td>

                <td>
                    {{ stock.product.name }}
                </td>

                <td>
                    {{ stock.quantity }}
                </td>

            </tr>

        {% empty %}

            <tr>

                <td colspan="3">

                    No stock found.

                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
