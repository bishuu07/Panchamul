{% extends 'dashboard/base.html' %}

{% block content %}

<div class="card-box">

    <h3>New Dispatch</h3>

    {% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <hr>

        <h5>Add Products</h5>

        <div class="row">

            <div class="col-md-5">

                <select id="product"
                        class="form-control">

                    {% for p in products %}

                    <option value="{{ p.id }}">

                        {{ p.name }}
                        (Stock: {{ p.current_stock }})

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="col-md-3">

                <input type="number"
                       step="0.01"
                       id="qty"
                       class="form-control"
                       placeholder="Quantity">

            </div>

            <div class="col-md-2">

                <button type="button"
                        class="btn btn-success"
                        onclick="addItem()">

                    Add

                </button>

            </div>

        </div>

        <hr>

        <table class="table table-bordered">

            <thead>

                <tr>

                    <th>Product</th>
                    <th>Quantity</th>

                </tr>

            </thead>

            <tbody id="itemsTable"></tbody>

        </table>

        <input type="hidden"
               name="items_json"
               id="items_json">

        <button class="btn btn-primary">

            Save Dispatch

        </button>

    </form>

</div>

<script>

let items = [];

function addItem() {

    let product = document.getElementById('product');
    let qty = document.getElementById('qty').value;

    if(qty === '') {
        alert('Enter quantity');
        return;
    }

    items.push({

        product: product.value,

        product_name:
            product.options[
                product.selectedIndex
            ].text,

        quantity: qty

    });

    renderTable();
}

function renderTable() {

    let html = '';

    items.forEach(item => {

        html += `
        <tr>
            <td>${item.product_name}</td>
            <td>${item.quantity}</td>
        </tr>
        `;
    });

    document.getElementById(
        'itemsTable'
    ).innerHTML = html;

    document.getElementById(
        'items_json'
    ).value = JSON.stringify(items);
}

</script>

{% endblock %}
