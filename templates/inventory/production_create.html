{% extends 'dashboard/base.html' %}

{% block content %}

<div class="card-box">

    <h3>Production Entry</h3>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <hr>

        <h5>Add Produced Items</h5>

        <div class="row">

            <div class="col-md-4">

                <select id="product"
                        class="form-control">

                    {% for p in products %}

                    <option value="{{ p.id }}">
                        {{ p.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="col-md-2">

                <input type="number"
                       step="0.01"
                       id="qty_produced"
                       class="form-control"
                       placeholder="Produced">

            </div>

            <div class="col-md-2">

                <input type="number"
                       step="0.01"
                       id="qty_wasted"
                       class="form-control"
                       placeholder="Wasted">

            </div>

            <div class="col-md-2">

                <button type="button"
                        class="btn btn-success"
                        onclick="addItem()">

                    Add

                </button>

            </div>

        </div>

        <hr>

        <table class="table table-bordered">

            <thead>

                <tr>

                    <th>Product</th>
                    <th>Produced</th>
                    <th>Wasted</th>

                </tr>

            </thead>

            <tbody id="itemsTable"></tbody>

        </table>

        <input type="hidden"
               id="items_json"
               name="items_json">

        <button class="btn btn-primary">

            Save Production

        </button>

    </form>

</div>

<script>

let items = [];

function addItem(){

    let product =
        document.getElementById('product');

    let qtyProduced =
        document.getElementById('qty_produced').value;

    let qtyWasted =
        document.getElementById('qty_wasted').value;

    items.push({

        product: product.value,

        product_name:
            product.options[
                product.selectedIndex
            ].text,

        quantity_produced:
            qtyProduced,

        quantity_wasted:
            qtyWasted

    });

    renderTable();
}

function renderTable(){

    let html = '';

    items.forEach(item => {

        html += `
        <tr>

            <td>${item.product_name}</td>

            <td>${item.quantity_produced}</td>

            <td>${item.quantity_wasted}</td>

        </tr>
        `;

    });

    document.getElementById(
        'itemsTable'
    ).innerHTML = html;

    document.getElementById(
        'items_json'
    ).value = JSON.stringify(items);
}

</script>

{% endblock %}
