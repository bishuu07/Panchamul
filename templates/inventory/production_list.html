{% extends 'dashboard/base.html' %}

{% block content %}

<div class="card-box">

    <h3>Production Output List</h3>

    <a href="{% url 'production_create' %}"
       class="btn btn-success mb-3">

        New Production

    </a>

    <table class="table table-bordered">

        <thead>

            <tr>

                <th>Date</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Created By</th>

            </tr>

        </thead>

        <tbody>

            {% for p in productions %}

            <tr>

                <td>{{ p.production_date }}</td>
                <td>{{ p.product.name }}</td>
                <td>{{ p.quantity }}</td>
                <td>{{ p.created_by }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
